<!DOCTYPE html>
<html>
<head>
    <title>GREEN PULSE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: url('/static/images/leaf-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }
        .overlay {
            background-color: rgba(0, 100, 0, 0.85);
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            max-width: 900px;
            width: 80%;
            box-shadow: 0 0 30px rgba(0, 80, 0, 0.8);
            border: 3px solid #c1f0c1;
        }
        h1 {
            font-size: 5rem;
            margin-bottom: 30px;
            color: #e0ffe0;
            font-weight: 800;
            letter-spacing: 2px;
        }
        p {
            font-size: 2rem;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            padding: 20px 50px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.8rem;
            margin-top: 30px;
            transition: all 0.3s;
            border: 3px solid #e0ffe0;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn:hover {
            background-color: #3e8e41;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(193, 240, 193, 0.9);
        }
        .logo {
            font-size: 1.8rem;
            position: absolute;
            top: 30px;
            left: 30px;
            background-color: rgba(0, 80, 0, 0.9);
            padding: 15px 30px;
            border-radius: 40px;
            font-weight: bold;
            border: 2px solid #c1f0c1;
        }
    </style>
</head>
<body>
    <div class="logo">GREEN PULSE</div>
    <div class="overlay">
        <h1>GREEN PULSE</h1>
        <p>Advanced Plant Health Diagnosis System</p>
        <a href="/analyze" class="btn">START ANALYSIS</a>
    </div>
</body>
</html>
